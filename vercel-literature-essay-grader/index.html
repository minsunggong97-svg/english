<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문학 서술형 AI 채점기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    .feedback-card { white-space: pre-wrap; }
  </style>
</head>
<body class="min-h-screen bg-stone-50 text-slate-800">
  <main class="mx-auto max-w-6xl p-4 sm:p-6 space-y-5">
    <header class="rounded-3xl bg-gradient-to-br from-amber-700 to-orange-800 p-6 sm:p-8 text-white shadow-xl">
      <p class="text-sm font-bold uppercase tracking-[0.2em] text-amber-100">Literature Essay Grader</p>
      <h1 class="mt-2 text-3xl sm:text-4xl font-black">문학 서술형 AI 채점기</h1>
      <p class="mt-3 max-w-3xl text-amber-50">중세 문학 학습지 내용을 바탕으로 서술형 답안을 직접 쓰고, AI가 내신형 기준으로 점수·잘한 점·감점 사유·누락 키워드·개념 오류·보완할 점을 깐깐하게 피드백합니다.</p>
    </header>

    <section class="grid gap-4 lg:grid-cols-[320px,1fr]">
      <aside class="space-y-4">
        <div class="rounded-2xl bg-white p-5 shadow border border-stone-100">
          <div class="flex items-center justify-between">
            <h2 class="font-extrabold text-slate-800">학습 현황</h2>
            <span id="progress-label" class="rounded-full bg-amber-50 px-3 py-1 text-xs font-bold text-amber-700">0 / 24</span>
          </div>
          <div class="mt-4 h-3 overflow-hidden rounded-full bg-stone-100">
            <div id="progress-bar" class="h-full bg-amber-600 transition-all" style="width: 0%"></div>
          </div>
          <div class="mt-4 grid grid-cols-3 gap-2 text-center text-sm">
            <div class="rounded-xl bg-stone-50 p-3">
              <div id="avg-score" class="text-xl font-black text-slate-800">-</div>
              <div class="text-xs font-semibold text-slate-500">평균</div>
            </div>
            <div class="rounded-xl bg-stone-50 p-3">
              <div id="low-count" class="text-xl font-black text-orange-600">0</div>
              <div class="text-xs font-semibold text-slate-500">복습</div>
            </div>
            <div class="rounded-xl bg-stone-50 p-3">
              <div id="done-count" class="text-xl font-black text-amber-700">0</div>
              <div class="text-xs font-semibold text-slate-500">채점</div>
            </div>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow border border-stone-100">
          <h2 class="font-extrabold text-slate-800">대분류 선택</h2>
          <div class="mt-3 grid grid-cols-1 gap-2 text-sm">
            <button onclick="setMajorCategory('all')" id="major-all" class="major-btn rounded-xl bg-amber-700 px-3 py-2 font-bold text-white">전체</button>
            <button onclick="setMajorCategory('중세 전기 문학')" id="major-early" class="major-btn rounded-xl bg-stone-100 px-3 py-2 font-bold text-slate-600">중세 전기 문학</button>
            <button onclick="setMajorCategory('중세 후기 문학')" id="major-late" class="major-btn rounded-xl bg-stone-100 px-3 py-2 font-bold text-slate-600">중세 후기 문학</button>
            <button onclick="setMajorCategory('이행기 문학')" id="major-transition" class="major-btn rounded-xl bg-stone-100 px-3 py-2 font-bold text-slate-600">이행기 문학</button>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-5 shadow border border-stone-100">
          <h2 class="font-extrabold text-slate-800">문제 필터</h2>
          <div class="mt-3 grid grid-cols-2 gap-2 text-sm">
            <button onclick="setFilter('all')" id="filter-all" class="filter-btn rounded-xl bg-amber-700 px-3 py-2 font-bold text-white">전체</button>
            <button onclick="setFilter('unanswered')" id="filter-unanswered" class="filter-btn rounded-xl bg-stone-100 px-3 py-2 font-bold text-slate-600">미완료</button>
            <button onclick="setFilter('review')" id="filter-review" class="filter-btn rounded-xl bg-stone-100 px-3 py-2 font-bold text-slate-600">복습 필요</button>
            <button onclick="resetProgress()" class="rounded-xl bg-red-50 px-3 py-2 font-bold text-red-600">기록 초기화</button>
          </div>
        </div>

        <div class="rounded-2xl bg-white p-4 shadow border border-stone-100">
          <h2 class="px-1 font-extrabold text-slate-800">문제 목록</h2>
          <div id="question-list" class="mt-3 max-h-[520px] space-y-2 overflow-y-auto pr-1"></div>
        </div>
      </aside>

      <section class="overflow-hidden rounded-2xl bg-white shadow-xl border border-stone-100">
        <div class="border-b border-stone-100 bg-stone-50 p-5">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-start sm:justify-between">
            <div>
              <p id="category-label" class="text-sm font-bold text-amber-700"></p>
              <h2 id="question-title" class="mt-1 text-2xl font-black text-slate-900"></h2>
            </div>
            <span id="question-counter" class="rounded-full bg-white px-3 py-1 text-sm font-bold text-slate-600 shadow-sm"></span>
          </div>
          <p id="question-text" class="mt-4 text-lg font-bold leading-relaxed text-slate-800"></p>
        </div>

        <div class="p-5 sm:p-6 space-y-5">
          <div class="rounded-2xl border border-amber-100 bg-amber-50 p-4">
            <h3 class="font-extrabold text-amber-800"><i class="fa-solid fa-key mr-2"></i>핵심 키워드</h3>
            <div id="keyword-list" class="mt-3 flex flex-wrap gap-2"></div>
          </div>

          <div>
            <label for="student-answer" class="block text-sm font-extrabold text-slate-700">내 답안</label>
            <textarea id="student-answer" rows="9" class="mt-2 w-full rounded-2xl border-2 border-stone-200 p-4 text-base leading-relaxed outline-none transition focus:border-amber-600 focus:ring-4 focus:ring-amber-100" placeholder="여기에 서술형 답안을 직접 작성하세요. 시대, 갈래, 형식 특징, 작품 예를 함께 쓰면 점수가 잘 나옵니다."></textarea>
          </div>

          <div class="flex flex-col gap-2 sm:flex-row sm:items-center sm:justify-between">
            <div class="flex gap-2">
              <button onclick="goToQuestion(-1)" id="prev-btn" class="rounded-xl border border-stone-200 bg-white px-4 py-3 font-bold text-slate-600 transition hover:bg-stone-50 disabled:opacity-40">
                <i class="fa-solid fa-arrow-left mr-2"></i>이전
              </button>
              <button onclick="goToQuestion(1)" id="next-btn" class="rounded-xl border border-stone-200 bg-white px-4 py-3 font-bold text-slate-600 transition hover:bg-stone-50 disabled:opacity-40">
                다음<i class="fa-solid fa-arrow-right ml-2"></i>
              </button>
            </div>
            <div class="flex gap-2">
              <button onclick="showModelAnswer()" class="rounded-xl bg-stone-100 px-4 py-3 font-bold text-slate-700 transition hover:bg-stone-200">
                모범답안 보기
              </button>
              <button onclick="gradeCurrentAnswer()" id="grade-btn" class="rounded-xl bg-amber-700 px-5 py-3 font-black text-white shadow-lg shadow-amber-100 transition hover:bg-amber-800">
                <i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 채점
              </button>
            </div>
          </div>

          <div id="model-answer-box" class="hidden rounded-2xl border border-stone-200 bg-stone-50 p-4">
            <h3 class="font-extrabold text-slate-800">모범답안</h3>
            <p id="model-answer-text" class="mt-2 leading-relaxed text-slate-700"></p>
          </div>

          <div id="feedback-box" class="hidden rounded-2xl border border-amber-100 bg-amber-50 p-5">
            <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
              <h3 class="text-xl font-black text-amber-950">AI 피드백</h3>
              <div class="flex items-center gap-2">
                <span id="score-badge" class="rounded-full bg-white px-4 py-2 text-lg font-black text-amber-700 shadow-sm">-</span>
                <span id="grade-label" class="rounded-full bg-amber-700 px-3 py-2 text-sm font-bold text-white">-</span>
              </div>
            </div>
            <div id="feedback-content" class="feedback-card mt-4 space-y-4"></div>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script>
    const STORAGE_KEY = 'literatureEssayGraderProgress';
    const LOW_SCORE_THRESHOLD = 75;
    const gradeEndpoint = '/api/grade-answer';

    const majorCategoryButtonIds = {
      all: 'major-all',
      '중세 전기 문학': 'major-early',
      '중세 후기 문학': 'major-late',
      '이행기 문학': 'major-transition'
    };

    const questions = [
      {
        id: 'q01',
        majorCategory: '중세 전기 문학',
        category: '문학사 흐름',
        title: '중세 문학의 흐름과 시대 구분',
        question: '중세 문학의 기록 방식, 작가층과 독자층의 변화, 중세 전기와 중세 후기의 구분 기준 및 대표 갈래를 설명하시오.',
        keywords: ['구비 문학', '한문', '차자 표기', '한글', '무신 정변', '몽골의 침입', '중세 전기', '중세 후기', '향가', '경기체가', '시조', '가사', '신흥 사대부'],
        rubric: ['구비 문학 외에 한문, 차자 표기, 한글 기록 문학이 등장했음을 쓴다.', '다양한 갈래 형성과 작가층·독자층 확대를 설명한다.', '무신 정변과 몽골 침입을 경계로 중세 전기와 후기를 구분한다.', '전기에는 향가와 한문학, 후기에는 신흥 사대부와 경기체가·시조·가사 등 갈래를 연결한다.'],
        modelAnswer: '중세에는 구비 문학 이외에 한문, 차자 표기, 한글로 표기하는 기록 문학이 등장하였다. 다양한 문학 갈래가 형성되면서 작가층과 독자층도 확대되었다. 중세 문학은 무신 정변과 몽골의 침입을 경계로 중세 전기 문학과 중세 후기 문학으로 나눌 수 있다. 중세 전기에는 향가와 한문학이 등장하였고, 중세 후기에는 신흥 사대부가 새로운 작가층으로 등장하면서 경기체가, 시조, 가사 등의 갈래가 새롭게 나타났다.'
      },
      {
        id: 'q02',
        majorCategory: '중세 전기 문학',
        category: '향가',
        title: '향가의 형식과 작품 예',
        question: '향가의 표기 방식, 형식 구분, 10구체 향가의 특징, 전승 작품 수와 대표 작품 예를 설명하시오.',
        keywords: ['향가', '국문 정형 시가', '향찰', '4구체', '8구체', '10구체', '제9행 감탄구', '25수', '서동요', '처용가', '찬기파랑가', '제망매가'],
        rubric: ['향가가 처음 확인되는 국문 정형 시가이며 향찰로 기록되었음을 쓴다.', '행 수에 따라 4구체, 8구체, 10구체로 나뉨을 쓴다.', '10구체의 제9행 첫머리 감탄구와 정형적 서정시의 형식미를 설명한다.', '고려 시대 작품까지 포함해 25수가 전하며 대표 작품 예를 정확히 제시한다.'],
        modelAnswer: '향가는 처음 확인되는 국문 정형 시가로, 향찰로 기록되었다. 행의 수에 따라 4구체, 8구체, 10구체로 나뉘며, 10구체는 제9행 첫머리에 감탄구를 두는 등 정형적 서정시로서의 형식미를 갖추었다고 평가된다. 향가는 고려 시대 작품까지 포함하여 모두 25수가 전한다. 4구체에는 서동요, 풍요, 헌화가, 도솔가가 있고, 8구체에는 모죽지랑가와 처용가가 있으며, 찬기파랑가와 제망매가를 비롯한 나머지 작품들은 10구체이다.'
      },
      {
        id: 'q03',
        majorCategory: '중세 전기 문학',
        category: '한문학과 구비 문학',
        title: '중세 전기의 한문학과 구비 문학',
        question: '중세 전기 한문학과 구비 문학의 전개 양상을 최치원 및 관련 작품을 포함하여 설명하시오.',
        keywords: ['한문 유입', '최치원', '격황소서', '한시', '양태사', '정지상', '구비 문학', '향악잡영', '민속극 공연'],
        rubric: ['한문 유입 이후 규범적 문장을 구사한 산문이 창작되었음을 쓴다.', '최치원의 격황소서를 예로 든다.', '최치원, 양태사, 정지상 등의 한시 작품을 언급한다.', '구비 문학의 창작·전승과 향악잡영의 민속극 공연 기록을 설명한다.'],
        modelAnswer: '한문이 유입되면서 최치원의 격황소서처럼 중세의 규범적 문장을 구사한 산문이 창작되었다. 또한 최치원, 양태사, 정지상 등이 문학성이 뛰어난 한시 작품을 남겼다. 구비 문학도 활발하게 창작되고 전승되었으며, 그 일부는 여러 문헌에 실려 오늘날까지 전한다. 특히 최치원의 향악잡영에는 민속극 공연에 관한 기록이 남아 있어 당시 구비 문학과 공연 문화의 전개를 보여 준다.'
      },
      {
        id: 'q04',
        majorCategory: '중세 후기 문학',
        category: '고려 속요',
        title: '고려 속요의 특징과 평가',
        question: '고려 속요의 형성 배경, 형식적 특징, 내용상 특징, 조선 시대의 평가와 대표 작품을 설명하시오.',
        keywords: ['고려 속요', '민간의 노래', '궁중 음악', '후렴구', '연장체', '3음보', '정형성 없음', '자연스러운 감정', '남녀상열지사', '청산별곡', '서경별곡', '가시리'],
        rubric: ['고려 시대 민간 노래 일부가 궁중 음악에 흡수되어 조선 시대까지 향유되었음을 쓴다.', '후렴구를 갖춘 연장체의 3음보 형식이 많지만 고유한 정형성은 없음을 설명한다.', '자연스러운 감정과 삶의 모습을 담았음을 쓴다.', '조선 시대에 남녀상열지사로 비판받은 점과 대표 작품을 포함한다.'],
        modelAnswer: '고려 속요는 고려 시대 민간의 노래 가운데 일부가 궁중 음악에 흡수되어 조선 시대까지 향유된 노래이다. 후렴구를 갖춘 연장체의 3음보 형식 작품이 많지만, 갈래 고유의 정형성은 나타나지 않는다. 주로 자연스러운 감정과 삶의 모습을 담았기 때문에 조선 시대에는 남녀상열지사로 비판받기도 했다. 대표 작품으로 청산별곡, 서경별곡, 가시리 등이 있다.'
      },
      {
        id: 'q05',
        majorCategory: '중세 후기 문학',
        category: '경기체가',
        title: '경기체가의 등장과 형식',
        question: '경기체가가 등장한 배경과 작가층, 표현 방식, 결구와 구성상의 형식적 특징, 대표 작품을 설명하시오.',
        keywords: ['경기체가', '신흥 사대부', '구체적 사물 나열', '감흥', '위 경 긔 엇더하니잇고', '여러 장', '한림별곡', '조선 시대'],
        rubric: ['경기체가가 신흥 사대부의 등장과 함께 나타났음을 쓴다.', '구체적 사물을 나열하면서 감흥을 드러내는 표현 방식을 설명한다.', '위 경 긔 엇더하니잇고라는 결구와 여러 장 구성의 형식 특징을 쓴다.', '최초 작품 한림별곡과 조선 시대까지 창작되었음을 포함한다.'],
        modelAnswer: '경기체가는 신흥 사대부의 등장과 함께 나타난 문학 갈래이다. 이 갈래는 구체적 사물을 나열하면서 그에 대한 감흥을 드러내는 방식으로 전개된다. 형식적으로는 위 경 긔 엇더하니잇고라는 결구를 갖추고 여러 장으로 구성된다는 특징이 있다. 최초 작품인 한림별곡이 창작된 이후 조선 시대까지 여러 작품이 창작되었다.'
      },
      {
        id: 'q06',
        majorCategory: '중세 후기 문학',
        category: '시조와 가사',

        modelAnswer: '상춘곡에는 여러 표현 방법이 사용된다. 홍진에 묻힌 분네 이내 생애 어떠한고, 산림에 묻혀 있어 지락을 모를 것가, 칼로 말아 낸가 붓으로 그려 낸가 같은 구절은 설의법으로, 화자의 자연 속 삶에 대한 자부심과 자연의 아름다움에 대한 감탄을 강조한다. 도화 행화는 석양 속에 피어 있고 녹양방초는 세우 중에 푸르도다 같은 표현은 대구법으로 운율감을 형성하고 봄 경치를 균형 있게 제시한다. 수풀에 우는 새가 춘기를 못 이겨 소리마다 교태롭다는 표현은 의인법으로 자연을 생동감 있게 드러낸다. 연하일휘는 금수를 펼쳐 놓은 듯하다는 표현은 직유법으로 봄 경치의 화려함과 아름다움을 구체적으로 보여 준다.'
      },
      {
        id: 'q24',
        majorCategory: '중세 후기 문학',
        category: '상춘곡',
        title: '사자성어와 화자의 태도',
        question: '상춘곡 1-39행에 나타난 주요 한자어와 사자성어를 찾아 뜻을 설명하고, 이를 통해 드러나는 화자의 자연관을 서술하시오.',
        keywords: ['홍진', '풍월 주인', '조화신공', '물아일체', '소요음영', '한중진미', '미음완보', '청풍명월', '단표누항', '백년행락', '안빈낙도'],
        rubric: ['홍진, 조화신공, 물아일체, 한중진미, 청풍명월, 단표누항 등 주요 한자어를 제시한다.', '각 용어의 뜻을 문맥에 맞게 설명한다.', '화자가 자연과 하나 되어 한가로움과 참된 즐거움을 누린다는 점을 설명한다.', '공명과 부귀보다 자연 속 안빈낙도와 풍류를 중시하는 자연관을 서술한다.'],
        modelAnswer: '상춘곡의 주요 한자어와 사자성어에는 홍진, 풍월 주인, 조화신공, 물아일체, 소요음영, 한중진미, 미음완보, 청풍명월, 단표누항, 백년행락 등이 있다. 홍진은 세속을 뜻하고, 풍월 주인은 자연의 맑은 바람과 달을 즐기는 주체를 뜻한다. 조화신공은 자연 만물을 만들어 낸 신비로운 조물주의 솜씨이고, 물아일체는 자연과 내가 하나가 되는 경지를 뜻한다. 한중진미는 한가로움 속의 참된 맛, 미음완보는 나지막이 읊조리며 천천히 걷는 태도, 청풍명월은 맑은 바람과 밝은 달, 단표누항은 가난하지만 도를 즐기는 소박한 삶을 뜻한다. 이러한 표현들은 화자가 공명과 부귀보다 자연 속에서 안빈낙도와 풍류를 누리는 삶을 이상적으로 여긴다는 점을 보여 준다.'
      }
    ];

    let currentIndex = 0;
    let currentMajorCategory = 'all';
    let currentFilter = 'all';
    let progress = {};
    let visibleIndexes = questions.map((_, index) => index);

    function loadProgress() {
      try {
        progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch (error) {
        progress = {};
      }
    }

    function saveProgress() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
    }

    function questionMatchesMajorCategory(question) {
      return currentMajorCategory === 'all' || question.majorCategory === currentMajorCategory;
    }

    function getMajorFilteredQuestions() {
      return questions.filter(questionMatchesMajorCategory);
    }

    function getVisibleIndexes() {
      return questions
        .map((question, index) => ({ question, index }))
        .filter(({ question }) => questionMatchesMajorCategory(question))
        .filter(({ question }) => {
          const saved = progress[question.id];
          if (currentFilter === 'unanswered') return !saved?.grading;
          if (currentFilter === 'review') return saved?.grading && Number(saved.grading.score) < LOW_SCORE_THRESHOLD;
          return true;
        })
        .map(({ index }) => index);
    }

    function setMajorCategory(category) {
      saveCurrentAnswerOnly();
      currentMajorCategory = category;
      currentIndex = questions.findIndex(question => questionMatchesMajorCategory(question));
      if (currentIndex < 0) currentIndex = 0;
      renderAll();
    }

    function setFilter(filter) {
      saveCurrentAnswerOnly();
      currentFilter = filter;
      const indexes = getVisibleIndexes();
      currentIndex = indexes.length ? indexes[0] : 0;
      renderAll();
    }

    function updateMajorCategoryButtons() {
      Object.entries(majorCategoryButtonIds).forEach(([category, id]) => {
        const button = document.getElementById(id);
        if (!button) return;
        const isActive = currentMajorCategory === category;
        button.className = `major-btn rounded-xl px-3 py-2 font-bold ${isActive ? 'bg-amber-700 text-white' : 'bg-stone-100 text-slate-600'}`;
      });
    }

    function updateFilterButtons() {
      ['all', 'unanswered', 'review'].forEach(filter => {
        const button = document.getElementById(`filter-${filter}`);
        const isActive = currentFilter === filter;
        button.className = `filter-btn rounded-xl px-3 py-2 font-bold ${isActive ? 'bg-amber-700 text-white' : 'bg-stone-100 text-slate-600'}`;
      });
    }

    function renderStats() {
      const scopedQuestions = getMajorFilteredQuestions();
      const graded = scopedQuestions.filter(question => progress[question.id]?.grading);
      const low = graded.filter(question => Number(progress[question.id].grading.score) < LOW_SCORE_THRESHOLD);
      const avg = graded.length
        ? Math.round(graded.reduce((sum, question) => sum + Number(progress[question.id].grading.score || 0), 0) / graded.length)
        : '-';

      document.getElementById('progress-label').innerText = `${graded.length} / ${scopedQuestions.length}`;
      document.getElementById('progress-bar').style.width = `${scopedQuestions.length ? (graded.length / scopedQuestions.length) * 100 : 0}%`;
      document.getElementById('avg-score').innerText = avg;
      document.getElementById('low-count').innerText = low.length;
      document.getElementById('done-count').innerText = graded.length;
    }

    function renderQuestionList() {
      visibleIndexes = getVisibleIndexes();
      const list = document.getElementById('question-list');
      if (!visibleIndexes.length) {
        list.innerHTML = '<p class="rounded-xl bg-stone-50 p-4 text-sm font-bold text-slate-500">조건에 맞는 문제가 없습니다.</p>';
        return;
      }

      list.innerHTML = visibleIndexes.map(index => {
        const question = questions[index];
        const saved = progress[question.id];
        const isActive = index === currentIndex;
        const score = saved?.grading?.score;
        return `
          <button onclick="selectQuestion(${index})" class="w-full rounded-xl p-3 text-left transition ${isActive ? 'bg-amber-700 text-white' : 'bg-stone-50 text-slate-700 hover:bg-amber-50'}">
            <div class="flex items-start justify-between gap-2">
              <div>
                <p class="text-xs font-bold opacity-80">${question.majorCategory} · ${question.category}</p>
                <p class="mt-1 text-sm font-black">${question.title}</p>
              </div>
              <span class="shrink-0 rounded-full ${isActive ? 'bg-white/20' : 'bg-white'} px-2 py-1 text-xs font-black">${score !== undefined ? `${score}점` : '미완료'}</span>
            </div>
          </button>
        `;
      }).join('');
    }

    function renderQuestion() {
      visibleIndexes = getVisibleIndexes();
      if (!visibleIndexes.includes(currentIndex)) {
        currentIndex = visibleIndexes.length ? visibleIndexes[0] : 0;
      }

      if (!visibleIndexes.length) {
        document.getElementById('category-label').innerText = '문제 없음';
        document.getElementById('question-title').innerText = '조건에 맞는 문제가 없습니다.';
        document.getElementById('question-counter').innerText = '0 / 0';
        document.getElementById('question-text').innerText = '필터를 변경하거나 기록을 초기화해 주세요.';
        document.getElementById('keyword-list').innerHTML = '';
        document.getElementById('student-answer').value = '';
        document.getElementById('feedback-box').classList.add('hidden');
        document.getElementById('model-answer-box').classList.add('hidden');
        return;
      }

      const question = questions[currentIndex];
      const position = visibleIndexes.indexOf(currentIndex) + 1;
      const saved = progress[question.id] || {};

      document.getElementById('category-label').innerText = `${question.majorCategory} · ${question.category}`;
      document.getElementById('question-title').innerText = question.title;
      document.getElementById('question-counter').innerText = `${position} / ${visibleIndexes.length}`;
      document.getElementById('question-text').innerText = question.question;
      document.getElementById('keyword-list').innerHTML = question.keywords.map(keyword => `<span class="rounded-full bg-white px-3 py-1 text-sm font-bold text-amber-800 shadow-sm">${escapeHtml(keyword)}</span>`).join('');
      document.getElementById('student-answer').value = saved.answer || '';
      document.getElementById('model-answer-text').innerText = question.modelAnswer;
      document.getElementById('model-answer-box').classList.add('hidden');

      const feedback = document.getElementById('feedback-box');
      if (saved.grading) {
        renderFeedback(saved.grading);
      } else {
        feedback.classList.add('hidden');
      }

      document.getElementById('prev-btn').disabled = position <= 1;
      document.getElementById('next-btn').disabled = position >= visibleIndexes.length;
    }

    function renderAll() {
      updateMajorCategoryButtons();
      updateFilterButtons();
      renderStats();
      renderQuestionList();
      renderQuestion();
    }

    function selectQuestion(index) {
      saveCurrentAnswerOnly();
      currentIndex = index;
      renderAll();
    }

    function goToQuestion(direction) {
      saveCurrentAnswerOnly();
      visibleIndexes = getVisibleIndexes();
      const currentPosition = visibleIndexes.indexOf(currentIndex);
      const nextIndex = visibleIndexes[currentPosition + direction];
      if (nextIndex === undefined) return;
      currentIndex = nextIndex;
      renderAll();
    }

    function saveCurrentAnswerOnly() {
      const question = questions[currentIndex];
      if (!question) return '';
      const answer = document.getElementById('student-answer').value.trim();
      if (answer || progress[question.id]) {
        progress[question.id] = {
          ...(progress[question.id] || {}),
          answer
        };
        saveProgress();
      }
      return answer;
    }

    function showModelAnswer() {
      document.getElementById('model-answer-box').classList.toggle('hidden');
    }

    function renderList(title, items, emptyText) {
      const safeItems = Array.isArray(items) ? items.filter(Boolean) : [];
      if (!safeItems.length) return `<div><h4 class="font-black text-slate-800">${title}</h4><p class="mt-1 text-sm text-slate-600">${emptyText}</p></div>`;
      return `<div><h4 class="font-black text-slate-800">${title}</h4><ul class="mt-2 list-disc space-y-1 pl-5 text-sm leading-relaxed text-slate-700">${safeItems.map(item => `<li>${escapeHtml(item)}</li>`).join('')}</ul></div>`;
    }

    function renderFeedback(grading) {
      document.getElementById('feedback-box').classList.remove('hidden');
      document.getElementById('score-badge').innerText = `${grading.score ?? '-'}점`;
      document.getElementById('grade-label').innerText = grading.gradeLabel || '채점';
      document.getElementById('feedback-content').innerHTML = `
        <div class="grid gap-4 md:grid-cols-2">
          ${renderList('잘한 점', grading.strengths, '인정된 핵심 내용이 아직 적습니다.')}
          ${renderList('감점 사유', grading.deductions, '뚜렷한 감점 사유는 없습니다.')}
          ${renderList('누락 키워드', grading.missingKeywords, '큰 누락 키워드는 없습니다.')}
          ${renderList('개념 오류', grading.conceptErrors, '뚜렷한 개념 오류는 없습니다.')}
          ${renderList('보완할 점', grading.improvements, '현재 답안을 조금 더 구체화하면 좋습니다.')}
        </div>
        <div class="rounded-xl bg-white p-4">
          <h4 class="font-black text-slate-800">다듬은 모범 답안</h4>
          <p class="mt-2 text-sm leading-relaxed text-slate-700">${escapeHtml(grading.modelAnswer || '')}</p>
        </div>
        <div class="rounded-xl bg-amber-100 p-4 text-sm font-bold text-amber-950">
          ${escapeHtml(grading.studyTip || '시대, 갈래, 형식 특징, 작품 예를 함께 묶어 기억하세요.')}
        </div>
      `;
      renderStats();
      renderQuestionList();
    }

    async function gradeCurrentAnswer() {
      const question = questions[currentIndex];
      const answer = saveCurrentAnswerOnly();
      if (!answer) {
        alert('먼저 답안을 입력해 주세요.');
        return;
      }

      const button = document.getElementById('grade-btn');
      button.disabled = true;
      button.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i>채점 중...';

      try {
        const response = await fetch(gradeEndpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            question: question.question,
            modelAnswer: question.modelAnswer,
            keywords: question.keywords,
            rubric: question.rubric,
            studentAnswer: answer
          })
        });

        if (!response.ok) {
          const text = await response.text();
          throw new Error(text || `채점 요청 실패: ${response.status}`);
        }

        const grading = await response.json();
        progress[question.id] = {
          answer,
          grading,
          gradedAt: new Date().toISOString()
        };
        saveProgress();
        renderFeedback(grading);
      } catch (error) {
        alert(`AI 채점 중 오류가 발생했습니다.\n${error.message}`);
      } finally {
        button.disabled = false;
        button.innerHTML = '<i class="fa-solid fa-wand-magic-sparkles mr-2"></i>AI 채점';
      }
    }

    function resetProgress() {
      if (!confirm('저장된 답안과 AI 피드백을 모두 삭제할까요?')) return;
      progress = {};
      saveProgress();
      renderAll();
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    window.onload = () => {
      loadProgress();
      renderAll();
    };
  </script>
</body>
</html>
